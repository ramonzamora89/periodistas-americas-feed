# Fuentes RSS/Atom para el feed de ataques a periodistas en las Américas.
#
# priority: usado para desempatar duplicados detectados entre fuentes distintas
#   que cubren el mismo caso. Gana (queda como registro principal) la fuente
#   con el número más bajo. 1 = CPJ, 2 = RSF, 3 = orgs regionales, 4 = Google Alerts.
#
# category: pestaña primaria del sitio. "libertad_prensa" = ataques, censura,
#   detenciones, informes de organismos de libertad de prensa. "periodismo" =
#   industria/oficio periodístico (tendencias, investigación académica, gremios).
#   La pestaña "migración" no depende de category: se arma por palabras clave
#   sobre el texto de cada item (ver MIGRATION_KEYWORDS en fetch_feeds.py),
#   así que un item de cualquier fuente puede aparecer ahí también.
#
# active: false deja la fuente definida pero fuera del fetch. Útil para expandir
#   cobertura sin borrar/reescribir entradas.

sources:
